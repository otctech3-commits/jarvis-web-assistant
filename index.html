<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>J.A.R.V.I.S - Web Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="jarvis-container">
    <div class="hud-overlay">
      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>
      <div class="scan-line"></div>
    </div>

    <header class="header">
      <div class="logo">
        <i class="fa-solid fa-atom"></i>
        <span>J.A.R.V.I.S</span>
      </div>
      <div class="status-bar">
        <div class="status-item">
          <span class="status-dot" id="micStatus"></span>
          <span>MIC</span>
        </div>
        <div class="status-item">
          <span class="status-dot" id="netStatus"></span>
          <span>ONLINE</span>
        </div>
        <div class="status-item" id="timeDisplay">00:00:00</div>
      </div>
    </header>

    <main class="main-display">
      <div class="core">
        <div class="core-ring ring1"></div>
        <div class="core-ring ring2"></div>
        <div class="core-ring ring3"></div>
        <div class="core-center" id="coreCenter">
          <i class="fa-solid fa-microphone-slash" id="micIcon"></i>
        </div>
        <div class="waveform" id="waveform">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="visual-screen" id="visualScreen">
        <div class="screen-content" id="screenContent">
          <div class="welcome-msg">
            <h2>Systems Online, Sir.</h2>
            <p>Just Another Rather Very Intelligent System</p>
            <p class="hint">Click core or say "Hey Jarvis" • Web search enabled</p>
          </div>
        </div>
      </div>

      <div class="chat-log" id="chatLog"></div>
    </main>

    <footer class="controls">
      <button class="control-btn" id="voiceBtn" title="Toggle Voice">
        <i class="fa-solid fa-volume-high"></i>
      </button>
      <div class="text-input">
        <input type="text" id="textInput" placeholder="Type command or 'search for...' ">
        <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
      <button class="control-btn" id="clearBtn" title="Clear">
        <i class="fa-solid fa-trash"></i>
      </button>
    </footer>
  </div>

  <script src="jarvis.js"></script>
</body>
</html>
